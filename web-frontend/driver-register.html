<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Trở thành Đối tác | UTH Express</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-6 font-sans">

    <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden grid grid-cols-1 md:grid-cols-2">
        <div class="bg-slate-900 text-white p-10 flex flex-col justify-center">
            <h1 class="text-3xl font-black italic tracking-tighter text-orange-500 mb-2">UTH Express</h1>
            <h2 class="text-4xl font-black mb-6 mt-6 leading-tight">Giao hàng tự do.<br>Thu nhập hấp dẫn.</h2>
            <p class="text-slate-400 font-medium">Hệ thống ghép đơn thông minh tự động tìm các cuốc xe phù hợp với tải trọng phương tiện của bạn.</p>
        </div>

        <div class="p-10">
            <h3 class="text-2xl font-black text-slate-800 mb-6">Đăng ký Tài khoản</h3>
            
            <form id="driverRegisterForm" class="space-y-4">
                <input id="regUsername" type="text" placeholder="Tên đăng nhập (VD: taixe_nguyen)" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" required>
                <input id="regEmail" type="email" placeholder="Email của bạn" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" required>
                <input id="regPassword" type="password" placeholder="Mật khẩu" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none" required>

                <div class="pt-4 mt-4 border-t border-slate-100">
                    <p class="text-xs font-bold uppercase text-slate-500 mb-3">Phương tiện của bạn</p>
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <label class="flex flex-col items-center p-3 border-2 border-orange-500 bg-orange-50 rounded-xl cursor-pointer vehicle-card" onclick="selectVehicle(this)">
                            <span class="material-symbols-outlined text-3xl text-orange-500 mb-1">two_wheeler</span>
                            <span class="font-bold text-sm text-slate-800">Xe Máy</span>
                            <span class="text-[10px] text-slate-500">Dưới 50kg</span>
                            <input type="radio" name="regVehicle" value="Xe máy|50" class="hidden" checked>
                        </label>

                        <label class="flex flex-col items-center p-3 border-2 border-slate-200 hover:border-blue-500 rounded-xl cursor-pointer vehicle-card" onclick="selectVehicle(this)">
                            <span class="material-symbols-outlined text-3xl text-blue-500 mb-1">airport_shuttle</span>
                            <span class="font-bold text-sm text-slate-800">Xe Bán Tải</span>
                            <span class="text-[10px] text-slate-500">Dưới 500kg</span>
                            <input type="radio" name="regVehicle" value="Xe bán tải|500" class="hidden">
                        </label>

                        <label class="flex flex-col items-center p-3 border-2 border-slate-200 hover:border-emerald-500 rounded-xl cursor-pointer vehicle-card" onclick="selectVehicle(this)">
                            <span class="material-symbols-outlined text-3xl text-emerald-500 mb-1">local_shipping</span>
                            <span class="font-bold text-sm text-slate-800">Xe Tải 1T</span>
                            <span class="text-[10px] text-slate-500">Dưới 1000kg</span>
                            <input type="radio" name="regVehicle" value="Xe tải 1 tấn|1000" class="hidden">
                        </label>
                    </div>
                </div>

                <button type="submit" id="btnSubmit" class="w-full mt-6 bg-orange-600 hover:bg-orange-700 text-white font-black text-lg py-4 rounded-xl transition-all shadow-lg shadow-orange-600/30">
                    ĐĂNG KÝ & BẮT ĐẦU CHẠY
                </button>
            </form>
        </div>
    </div>

    <script>
        function selectVehicle(element) {
            document.querySelectorAll('label').forEach(el => {
                el.className = "flex flex-col items-center p-3 border-2 border-slate-200 hover:border-blue-500 hover:bg-blue-50 rounded-xl cursor-pointer transition-all";
            });
            element.className = "flex flex-col items-center p-3 border-2 border-orange-500 bg-orange-50 rounded-xl cursor-pointer transition-all";
        }

        document.getElementById('driverRegisterForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.innerHTML = "ĐANG XỬ LÝ...";
            btn.disabled = true;

            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const vehicleVal = document.querySelector('input[name="regVehicle"]:checked').value;
            const [vType, vWeight] = vehicleVal.split('|');

            try {
                // 1. Gọi Order Service (8001) để Tạo tài khoản
                const resAuth = await fetch('http://localhost:8001/api/auth/register-driver', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });

                const dataAuth = await resAuth.json();
                if (!resAuth.ok) {
                    alert("Lỗi: " + dataAuth.error);
                    btn.innerHTML = "ĐĂNG KÝ & BẮT ĐẦU CHẠY";
                    btn.disabled = false;
                    return;
                }

                // Lưu token vào máy
                const token = dataAuth.token;
                localStorage.setItem('jwt_token', token);

                // 2. Gọi Driver Service (8002) để Đăng ký Xe vào hồ sơ
                const resVehicle = await fetch('http://localhost:8002/api/drivers/register-vehicle', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + token 
                    },
                    body: JSON.stringify({
                        vehicle_type: vType,
                        max_weight: parseFloat(vWeight)
                    })
                });

                if (resVehicle.ok) {
                    // Đăng ký thành công trọn bộ -> Chuyển thẳng vào màn hình Radar!
                    window.location.href = 'driver.html';
                } else {
                    alert("Tạo tài khoản thành công nhưng đăng ký xe thất bại!");
                }
            } catch (error) {
                alert("Không thể kết nối đến máy chủ!");
                btn.innerHTML = "ĐĂNG KÝ & BẮT ĐẦU CHẠY";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
