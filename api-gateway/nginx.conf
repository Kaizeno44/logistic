worker_processes 1;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    upstream order_service {
        server order-service:8001;
    }

    upstream driver_service {
        server driver-service:8002;
    }

    server {
        listen 8080;
        server_name localhost;

        # Xử lý CORS thống nhất tại API Gateway
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, Content-Length, Content-Type, Authorization, Accept, X-Requested-With' always;

        # Ẩn các header CORS từ backend trả về để tránh lỗi trùng lặp (Multiple Access-Control-Allow-Origin)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # Bắt các request OPTIONS (Preflight) và trả về 204 ngay lập tức
        if ($request_method = 'OPTIONS') {
            return 204;
        }
        # 1. Driver Service: PUT /api/orders/:tracking_code/status
        # Sử dụng Regex để bắt chính xác route này
        location ~ ^/api/orders/[a-zA-Z0-9_-]+/status$ {
            proxy_pass http://driver_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 2. Driver Service: Các route liên quan đến tài xế (/api/driver, /api/drivers)
        location ~ ^/api/driver {
            proxy_pass http://driver_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 3. Order Service: Đóng vai trò mặc định cho các route /api/ còn lại 
        # (như /api/auth, /api/orders, /api/admin, /api/districts...)
        location /api/ {
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
        
        # 4. Trả về 404 cho các request không hợp lệ
        location / {
            return 404;
        }
    }
}
